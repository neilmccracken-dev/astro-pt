name: Evaluation
duration: 60
pricing: 100
description: >-
  A comprehensive physical therapy evaluation is a crucial first step in your
  care, involving a thorough review of your medical history, a hands-on physical
  assessment, and a discussion of your functional goals. Following this initial
  appointment, your Physical Therapist will analyze your movement mechanics,
  strength, and flexibility to identify the root cause of your pain or mobility
  limitations. This detailed report allows us to design a fully customized,
  actionable treatment plan that will help you safely return to your prior level
  of function and prevent future injuries.
